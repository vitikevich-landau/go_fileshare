# CI: сборка, vet и тесты (race detector) на трёх основных платформах.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # прочие цели обязаны собираться (fsnotify деградирует честно)
      - run: GOOS=linux   GOARCH=amd64 go build ./...
      - run: GOOS=windows GOARCH=amd64 go build ./...
      - run: GOOS=darwin  GOARCH=arm64 go build ./...
